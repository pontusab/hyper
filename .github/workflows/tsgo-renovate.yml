name: tsgo-bump

on:
  schedule:
    - cron: "0 9 * * 1" # weekly Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Fetch latest @typescript/native-preview
        id: latest
        run: |
          latest=$(npm view @typescript/native-preview version)
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
      - name: Update pin
        run: |
          latest=${{ steps.latest.outputs.latest }}
          echo "$latest" > .tsversion
          bun ./tools/update-tsgo-pin.ts "$latest"
      - uses: peter-evans/create-pull-request@v6
        with:
          branch: tsgo/weekly-bump
          title: "chore(tsgo): bump @typescript/native-preview to ${{ steps.latest.outputs.latest }}"
          commit-message: "chore(tsgo): bump @typescript/native-preview to ${{ steps.latest.outputs.latest }}"
          body: |
            Automated weekly bump. CI must be green before merging.
            See `docs/adr/0002-tsgo-bugs.md` for known issues.
